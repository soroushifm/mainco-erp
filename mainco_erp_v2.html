<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAINCO Movers — Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2744;--navy-light:#243460;--navy-dark:#0f1a30;--orange:#e84c0a;--orange-light:#ff6b2b;--orange-pale:#fff3ee;--white:#fff;--bg:#f4f6fb;--bg2:#eef0f7;--border:#e2e6f0;--text:#1a2744;--text-mid:#4a5568;--text-light:#8896a9;--green:#16a34a;--green-bg:#f0fdf4;--amber:#d97706;--amber-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;--sidebar-w:230px;--header-h:56px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;z-index:10}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:24px}
.sb-logo{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:8px}
.sb-logo-img{width:44px;height:44px;object-fit:contain;flex-shrink:0;border-radius:4px}
.sb-brand{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fff;letter-spacing:0.5px;line-height:1}
.sb-tagline{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:1.5px;font-weight:600;margin-top:1px}
.sb-section{padding:10px 10px 4px;font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);transition:all 0.15s}
.sb-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.sb-item.active{background:var(--orange);color:#fff;font-weight:600}
.sb-item .si{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-item .badge{margin-left:auto;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
.sb-item.active .badge{background:rgba(255,255,255,0.3)}
.sb-user{margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.sb-avatar{width:34px;height:34px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.sb-user-name{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:10px;color:rgba(255,255,255,0.4)}
.tb-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--navy)}
.tb-search{flex:1;max-width:340px;position:relative;margin-left:8px}
.tb-search input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--border);border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;background:var(--bg);color:var(--text);outline:none}
.tb-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-light);font-size:14px}
.tb-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.tb-notif{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;position:relative}
.tb-notif .dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--orange);border-radius:50%;border:1.5px solid white}
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.card{background:var(--white);border-radius:12px;padding:18px 20px;border:1px solid var(--border);position:relative;overflow:hidden}
.card-accent{position:absolute;top:0;right:0;width:4px;height:100%}
.card-label{font-size:11px;font-weight:600;color:var(--text-light);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.card-value{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--navy);line-height:1}
.card-sub{font-size:11.5px;color:var(--text-light);margin-top:6px}
.card-sub .up{color:var(--green);font-weight:600}
.card-sub .dn{color:var(--red);font-weight:600}
.card-icon{position:absolute;top:16px;right:18px;font-size:26px;opacity:0.15}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--navy)}
.section-title span{color:var(--orange)}
.table-wrap{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:0.8px;color:var(--text-light);text-transform:uppercase;white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text-mid);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.4px}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-navy{background:#eef1f8;color:var(--navy)}
.badge-orange{background:var(--orange-pale);color:var(--orange)}
.badge-blue{background:#eff6ff;color:#2563eb}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:hover{background:var(--orange-light)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-light)}
.btn-outline{background:transparent;color:var(--navy);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--navy);background:var(--bg)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-ghost{background:transparent;color:var(--text-mid);padding:5px 10px}
.btn-ghost:hover{background:var(--bg)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--navy)}
input,select,textarea{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--text);background:var(--white);outline:none;transition:border 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--orange)}
textarea{resize:vertical;min-height:72px}
.modal-overlay{position:fixed;inset:0;background:rgba(15,26,48,0.55);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s}
.modal{background:var(--white);border-radius:14px;width:720px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);animation:slideUp 0.2s}
.modal-lg{width:900px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0;position:sticky;top:0;background:var(--white);z-index:1;padding-bottom:12px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--navy)}
.modal-body{padding:18px 24px 24px}
.modal-close{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-mid)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border);margin-top:16px}
.stats-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:22px}
.chart-box{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:20px}
.chart-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:140px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;height:100%}
.bar{width:100%;border-radius:4px 4px 0 0;cursor:pointer;position:relative}
.bar:hover{opacity:0.85}
.bar-lbl{font-size:10px;color:var(--text-light);font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.crew-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.crew-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:18px;text-align:center}
.crew-avatar{width:52px;height:52px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;margin:0 auto 10px;font-weight:700}
.truck-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.truck-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:18px}
.pay-summary{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.pay-box{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:16px 18px}
.pay-box-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--navy)}
.pay-box-lbl{font-size:10px;color:var(--text-light);font-weight:600;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px}
.report-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.report-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:18px;cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s}
.report-card:hover{border-color:var(--orange);box-shadow:0 4px 16px rgba(232,76,10,0.1)}
.tab-row{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:7px 16px;font-size:13px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.divider{height:1px;background:var(--border);margin:14px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-hd{text-align:center;font-size:11px;font-weight:700;color:var(--text-light);letter-spacing:1px;padding:4px 0}
.cal-day{background:var(--white);border:1px solid var(--border);border-radius:8px;min-height:90px;padding:6px;cursor:pointer;transition:border-color 0.15s}
.cal-day:hover{border-color:var(--orange)}
.cal-day.today{border-color:var(--orange);border-width:2px}
.cal-day.other-month{opacity:0.4}
.cal-day-num{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px}
.cal-event{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.inv-preview{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:28px 32px}
.inv-header{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:18px;border-bottom:3px solid var(--orange);margin-bottom:20px}
.inv-brand{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;color:var(--navy)}
.inv-contact{font-size:12px;color:var(--text-mid);text-align:right;line-height:1.8}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.inv-title{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:800;color:var(--navy)}
.inv-lbl{font-weight:700;color:var(--navy);min-width:90px}
.inv-billto-box{border:2px solid var(--navy);border-radius:8px;padding:14px 18px}
.inv-billto-hd{background:var(--navy);color:#fff;font-size:11px;font-weight:700;letter-spacing:1.5px;padding:4px 12px;border-radius:4px;display:inline-block;margin-bottom:10px}
.inv-grand{background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;margin-top:10px}
.inv-grand .amt{background:var(--orange);padding:4px 16px;border-radius:6px}
.note-item-card{background:var(--bg);border-radius:8px;padding:12px 14px;border-left:3px solid var(--orange);margin-bottom:8px}
.note-date{font-size:11px;color:var(--text-light);font-weight:600}
.note-text{font-size:13px;color:var(--text-mid);margin-top:4px}
.note-author{font-size:11px;color:var(--orange);font-weight:600}
.profit-green{color:var(--green);font-weight:700}
.profit-red{color:var(--red);font-weight:700}
.cost-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.cost-row:last-child{border-bottom:none}
.kpi-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:18px;text-align:center}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800}
.kpi-lbl{font-size:11px;color:var(--text-light);font-weight:600;letter-spacing:0.8px;text-transform:uppercase;margin-top:4px}
.expense-cats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.exp-cat{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s}
.exp-cat.active,.exp-cat:hover{border-color:var(--orange);background:var(--orange-pale);color:var(--orange)}
.pl-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.pl-row:last-child{border-bottom:none}
.pl-row.total{font-weight:800;font-size:16px;color:var(--navy)}
.pl-row.net{background:var(--navy);color:#fff;padding:12px 16px;border-radius:8px;margin-top:8px;border-bottom:none}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.settings-section{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:20px}
.settings-section-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.logo-upload-area{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all 0.15s;margin-bottom:12px}
.logo-upload-area:hover{border-color:var(--orange);background:var(--orange-pale)}
.logo-preview{width:80px;height:80px;object-fit:contain;border-radius:8px;border:1px solid var(--border);margin:0 auto 8px;display:block}
.customer-profile{display:grid;grid-template-columns:280px 1fr;gap:20px}
.customer-sidebar-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:20px}
.stat-box{background:var(--bg);border-radius:8px;padding:10px 14px;margin-bottom:8px}
.stat-box-lbl{font-size:10px;color:var(--text-light);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.stat-box-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--navy)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeIn 0.2s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
@media print{body{background:white;padding:0}.controls,.sidebar,.topbar{display:none!important}.modal-overlay{position:static;background:transparent}.modal{box-shadow:none;width:100%;max-width:none;max-height:none}}
</style>
</head>

// ============ HELPERS ============
function jobCost(j){const c=j.costs;return Object.values(c).reduce((a,v)=>a+v,0)}
function jobProfit(j){return j.revenue-jobCost(j)}
function jobMargin(j){return j.revenue>0?((jobProfit(j)/j.revenue)*100).toFixed(1):0}
function fmt(n){return "$"+Number(n).toLocaleString()}
function jobBadge(s){const m={Scheduled:"badge-amber","On The Way":"badge-blue",Started:"badge-blue",Loading:"badge-blue","In Transit":"badge-navy",Unloading:"badge-navy",Completed:"badge-green",Cancelled:"badge-red"};return `<span class="badge ${m[s]||"badge-navy"}">${s}</span>`}
function payBadge(s){const m={Paid:"badge-green",Unpaid:"badge-amber",Partial:"badge-blue",Overdue:"badge-red"};return `<span class="badge ${m[s]||"badge-navy"}">${s}</span>`}
function quotBadge(s){const m={Sent:"badge-orange",Negotiating:"badge-amber",Converted:"badge-green",Draft:"badge-navy"};return `<span class="badge ${m[s]||"badge-navy"}">${s}</span>`}

// ============ NAV ============
function nav(page,param){
  STATE.page=page;STATE.pageParam=param;
  const titles={dashboard:"Dashboard",customers:"Customers",jobs:"Job Management",quotations:"Quotations",invoices:"Invoices",expenses:"Expenses",payments:"Payments",reports:"Reports & P&L",schedule:"Schedule Calendar",crew:"Crew Management",trucks:"Truck Management",settings:"Company Settings",customerProfile:"Customer Profile"};
  document.getElementById("page-title").textContent=titles[page]||page;
  document.querySelectorAll(".sb-item").forEach(el=>{
    const onclick=el.getAttribute("onclick")||"";
    el.classList.toggle("active",onclick.includes(`nav('${page}')`));
  });
  render();
}

function render(){
  const c=document.getElementById("content");
  const pages={dashboard,customers,jobs,quotations,invoices,expenses,payments,reports,schedule,crew,trucks,settings,customerProfile};
  c.innerHTML="";
  c.appendChild((pages[STATE.page]||dashboard)());
}

window.handleLogoUpload=function(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    COMPANY.logo=e.target.result;
    document.getElementById("sb-logo-img").src=e.target.result;
    document.getElementById("settings-logo-preview").src=e.target.result;
    alert("Logo updated! It will now appear on all invoices and the sidebar.");
  };
  reader.readAsDataURL(file);
};

function openModal(html,large=false){
  const box=document.getElementById("modal-box");
  box.innerHTML=html;
  box.className="modal"+(large?" modal-lg":"");
  document.getElementById("modal").style.display="flex";
}
function closeModal(e){
  if(!e||e.target===document.getElementById("modal")){
    document.getElementById("modal").style.display="none";
  }
}

window.showNewJob=function(custId){
  openModal(`<div class="modal-hd"><div class="modal-title">New Job</div><div class="modal-close" onclick="closeModal()">✕</div></div>
  <div class="modal-body"><div class="form-grid">
    <div class="form-group"><label>Job #</label><input type="text" value="J-0606" readonly style="background:var(--bg);"></div>
    <div class="form-group"><label>Customer *</label><select>${STATE.customers.map(c=>`<option${c.id===custId?" selected":""}>${c.name}</option>`).join("")}</select></div>
    <div class="form-group"><label>Move Date *</label><input type="date"></div>
    <div class="form-group"><label>Start Time</label><input type="time" value="08:00"></div>
    <div class="form-group"><label>Service Type</label><select><option>Full House Moving</option><option>Office Moving</option><option>Partial Moving</option></select></div>
    <div class="form-group"><label>Truck</label><select>${STATE.trucks.filter(t=>t.status==="Available").map(t=>`<option>${t.plate} (${t.type})</option>`).join("")}</select></div>
    <div class="form-group"><label>Revenue (SGD) *</label><input type="number" placeholder="0.00" min="0"></div>
    <div class="form-group"><label>Assign Crew</label><select><option>-- Select --</option>${STATE.crew.filter(c=>c.avail).map(c=>`<option>${c.name}</option>`).join("")}</select></div>
    <div class="form-group full"><label>Notes</label><textarea placeholder="Special instructions..."></textarea></div>
  </div>
  <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="closeModal()">Create Job</button></div></div>`);
};

window.showJobDetail=function(jobId){
  const j=STATE.jobs.find(x=>x.id===jobId);if(!j)return;
  const statuses=["Scheduled","On The Way","Started","Loading","In Transit","Unloading","Completed"];
  const curIdx=statuses.indexOf(j.status);
  openModal(`<div class="modal-hd"><div class="modal-title">Job ${j.id}</div><div class="modal-close" onclick="closeModal()">✕</div></div>
  <div class="modal-body">
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;">
    <div style="background:var(--bg);border-radius:8px;padding:12px;"><div style="font-size:11px;color:var(--text-light);font-weight:600;margin-bottom:4px;">CUSTOMER</div><div style="font-weight:700;color:var(--navy);">${j.customer}</div></div>
    <div style="background:var(--bg);border-radius:8px;padding:12px;"><div style="font-size:11px;color:var(--text-light);font-weight:600;margin-bottom:4px;">DATE & TIME</div><div style="font-weight:700;color:var(--navy);">${j.date} ${j.start}</div></div>
    <div style="background:var(--bg);border-radius:8px;padding:12px;"><div style="font-size:11px;color:var(--text-light);font-weight:600;margin-bottom:4px;">TRUCK</div><div style="font-weight:700;color:var(--navy);">${j.truck}</div></div>
  </div>
  <div style="font-weight:700;font-size:13px;color:var(--navy);margin-bottom:10px;">Job Progress</div>
  <div style="display:flex;align-items:center;gap:6px;overflow-x:auto;padding:8px 0;margin-bottom:16px;">
    ${statuses.map((s,i)=>`<div style="display:flex;align-items:center;gap:6px;"><div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="width:28px;height:28px;border-radius:50%;border:2px solid ${i<curIdx?"var(--green)":i===curIdx?"var(--orange)":"var(--border)"};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:${i<curIdx?"var(--green)":i===curIdx?"var(--orange)":"var(--white)"};color:${i<=curIdx?"#fff":"var(--text-light)"};">${i<curIdx?"✓":i+1}</div><div style="font-size:10px;color:var(--text-light);white-space:nowrap;font-weight:600;">${s}</div></div>${i<statuses.length-1?`<div style="width:24px;height:2px;background:${i<curIdx?"var(--green)":"var(--border)"};flex-shrink:0;"></div>`:""}</div>`).join("")}
  </div>
  <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Close</button><button class="btn btn-navy" onclick="showJobCosts('${j.id}')">View Costs</button>${j.status!=="Completed"?`<button class="btn btn-primary" onclick="closeModal()">Update Status</button>`:""}</div>
  </div>`);
};

window.showNewCrew=function(){
  openModal(`<div class="modal-hd"><div class="modal-title">Add Staff</div><div class="modal-close" onclick="closeModal()">✕</div></div>
  <div class="modal-body"><div class="form-grid">
    <div class="form-group"><label>Full Name *</label><input type="text" placeholder="Name"></div>
    <div class="form-group"><label>Phone *</label><input type="text" placeholder="8xxx xxxx"></div>
    <div class="form-group"><label>Position</label><select><option>Mover</option><option>Driver</option><option>Team Leader</option><option>Supervisor</option></select></div>
    <div class="form-group"><label>Availability</label><select><option>Available</option><option>Unavailable</option></select></div>
  </div>
  <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="closeModal()">Add Staff</button></div></div>`);

window.showNewTruck=function(){
  openModal(`<div class="modal-hd"><div class="modal-title">Add Truck</div><div class="modal-close" onclick="closeModal()">✕</div></div>
  <div class="modal-body"><div class="form-grid">
    <div class="form-group"><label>Vehicle Plate *</label><input type="text" placeholder="SXX 0000 X"></div>
    <div class="form-group"><label>Truck Type</label><select><option>10ft Lorry</option><option>14ft Lorry</option><option>24ft Lorry</option></select></div>
    <div class="form-group"><label>Capacity</label><select><option>1.5 Ton</option><option>3 Ton</option><option>5 Ton</option></select></div>
    <div class="form-group"><label>Status</label><select><option>Available</option><option>In Service</option><option>Maintenance</option></select></div>
    <div class="form-group"><label>Next Maintenance</label><input type="date"></div>
    <div class="form-group"><label>Insurance Expiry</label><input type="date"></div>

window.showEditCustomer=function(custId){
  const c=STATE.customers.find(x=>x.id===custId);
  openModal(`<div class="modal-hd"><div class="modal-title">Edit Customer</div><div class="modal-close" onclick="closeModal()">✕</div></div>
  <div class="modal-body"><div class="form-grid">
    <div class="form-group"><label>Full Name</label><input type="text" id="ec-name" value="${c.name}"></div>
    <div class="form-group"><label>Phone</label><input type="text" id="ec-phone" value="${c.phone}"></div>
    <div class="form-group"><label>Email</label><input type="email" id="ec-email" value="${c.email}"></div>
    <div class="form-group"><label>Move Date</label><input type="date" id="ec-date" value="${c.date}"></div>
    <div class="form-group full"><label>Current Address</label><input type="text" id="ec-addr" value="${c.addr}"></div>
    <div class="form-group full"><label>Moving To</label><input type="text" id="ec-dest" value="${c.dest}"></div>
  </div>
  <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="updateCustomer(${custId})">Save Changes</button></div></div>`);
};

window.updateCustomer=function(custId){
  const c=STATE.customers.find(x=>x.id===custId);
  c.name=document.getElementById("ec-name").value;
  c.phone=document.getElementById("ec-phone").value;
  c.email=document.getElementById("ec-email").value;
  c.date=document.getElementById("ec-date").value;
  c.addr=document.getElementById("ec-addr").value;
  c.dest=document.getElementById("ec-dest").value;
  closeModal();nav("customerProfile",custId);
};

window.showQuickAdd=function(){
  openModal(`<div class="modal-hd"><div class="modal-title">Quick Add</div><div class="modal-close" onclick="closeModal()">✕</div></div>
  <div class="modal-body"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    ${[{icon:"👥",label:"New Customer",fn:"showNewCustomer()"},{icon:"📋",label:"New Quotation",fn:"showNewQuotation()"},{icon:"🧾",label:"New Invoice",fn:"showNewInvoice()"},{icon:"📦",label:"New Job",fn:"showNewJob()"},{icon:"💳",label:"Add Expense",fn:"showAddExpense()"},{icon:"💰",label:"Record Payment",fn:"showRecordPayment('—')"}].map(a=>`<button class="btn btn-outline" style="justify-content:flex-start;padding:14px 16px;font-size:14px;gap:10px;" onclick="${a.fn};closeModal();"><span style="font-size:20px;">${a.icon}</span>${a.label}</button>`).join("")}
  </div></div>`);
};

// INIT
render();
</script>
