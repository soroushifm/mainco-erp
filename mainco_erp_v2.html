<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2744">
<title>MAINCO ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2744;--navy2:#243460;--orange:#e84c0a;--orange2:#ff6b2b;
  --white:#fff;--bg:#f4f6fb;--border:#e2e6f0;
  --text:#1a2744;--mid:#4a5568;--light:#8896a9;
  --green:#16a34a;--green-bg:#f0fdf4;
  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --nav-h:60px;--header-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* ── TOP HEADER ── */
.header{
  height:var(--header-h);background:var(--navy);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  flex-shrink:0;position:relative;z-index:20;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.header-logo{width:36px;height:36px;object-fit:contain;border-radius:6px;flex-shrink:0;}
.header-title{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:800;color:#fff;flex:1;letter-spacing:0.5px;}
.header-actions{display:flex;gap:8px;align-items:center;}
.icon-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.12);border:none;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;color:#fff;flex-shrink:0;}

/* ── MAIN SCROLL AREA ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 8px);}

/* ── BOTTOM NAV ── */
.bottom-nav{
  height:var(--nav-h);background:var(--navy);
  display:flex;align-items:center;justify-content:space-around;
  flex-shrink:0;position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -2px 12px rgba(0,0,0,0.25);
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 10px;border-radius:10px;transition:all 0.15s;min-width:52px;}
.nav-item.active{background:var(--orange);}
.nav-item .ni{font-size:20px;line-height:1;}
.nav-item .nl{font-size:9px;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:0.5px;text-transform:uppercase;}
.nav-item.active .nl{color:#fff;}

/* ── MORE DRAWER ── */
.more-drawer{position:fixed;bottom:var(--nav-h);left:0;right:0;background:var(--navy2);border-radius:20px 20px 0 0;padding:16px;z-index:19;transform:translateY(100%);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);box-shadow:0 -4px 24px rgba(0,0,0,0.3);}
.more-drawer.open{transform:translateY(0);}
.more-drawer-handle{width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 16px;}
.more-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.more-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;border-radius:12px;background:rgba(255,255,255,0.08);cursor:pointer;transition:all 0.15s;}
.more-item:active{background:rgba(255,255,255,0.16);}
.more-item .mi{font-size:22px;}
.more-item .ml{font-size:10px;font-weight:600;color:rgba(255,255,255,0.7);text-align:center;letter-spacing:0.3px;}

/* ── PAGE ── */
.page{padding:16px;animation:fadeIn 0.2s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ── */
.card{background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;}
.card-body{padding:16px;}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--white);border-radius:14px;padding:14px;border:1px solid var(--border);position:relative;overflow:hidden;}
.stat-card .accent{position:absolute;top:0;left:0;width:100%;height:3px;}
.stat-label{font-size:10px;font-weight:700;color:var(--light);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px;}
.stat-value{font-family:"Barlow Condensed",sans-serif;font-size:26px;font-weight:800;color:var(--text);line-height:1;}
.stat-sub{font-size:11px;color:var(--light);margin-top:4px;}

/* ── TODAY BANNER ── */
.today-banner{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:16px;padding:16px;margin-bottom:14px;}
.today-title{font-size:12px;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.today-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.today-metric{text-align:center;background:rgba(255,255,255,0.08);border-radius:10px;padding:10px 6px;}
.today-metric .tm-val{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;color:#fff;line-height:1;}
.today-metric .tm-lbl{font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}

/* ── SECTION HEADER ── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px;}
.sec-title{font-family:"Barlow Condensed",sans-serif;font-size:17px;font-weight:800;color:var(--navy);}
.sec-title span{color:var(--orange);}
.sec-link{font-size:12px;font-weight:700;color:var(--orange);cursor:pointer;}

/* ── LIST CARDS ── */
.list-card{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px;}
.list-item{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.1s;}
.list-item:last-child{border-bottom:none;}
.list-item:active{background:var(--bg);}
.list-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.list-main{flex:1;min-width:0;}
.list-name{font-weight:700;font-size:14px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-sub{font-size:12px;color:var(--light);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-right{text-align:right;flex-shrink:0;}
.list-val{font-weight:700;font-size:14px;color:var(--navy);}
.list-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-top:3px;}

/* ── BADGE COLORS ── */
.bg-green{background:var(--green-bg);color:var(--green);}
.bg-amber{background:var(--amber-bg);color:var(--amber);}
.bg-red{background:var(--red-bg);color:var(--red);}
.bg-navy{background:#eef1f8;color:var(--navy);}
.bg-orange{background:#fff3ee;color:var(--orange);}
.bg-blue{background:#eff6ff;color:#2563eb;}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--nav-h) + 16px);right:16px;width:52px;height:52px;background:var(--orange);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;box-shadow:0 4px 16px rgba(232,76,10,0.4);cursor:pointer;z-index:15;border:none;transition:all 0.15s;}
.fab:active{transform:scale(0.95);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,26,48,0.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom);animation:slideUp 0.25s cubic-bezier(0.4,0,0.2,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;}
.modal-title{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:800;color:var(--navy);}
.modal-body{padding:0 20px 20px;}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mid);}
.modal-footer{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--border);}

/* ── FORMS ── */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:700;color:var(--navy);display:block;margin-bottom:6px;}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:"Barlow",sans-serif;font-size:15px;color:var(--text);background:var(--white);outline:none;-webkit-appearance:none;appearance:none;}
.form-input:focus{border-color:var(--orange);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 20px;border-radius:12px;font-family:"Barlow",sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;width:100%;}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--orange);color:#fff;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-outline{background:transparent;color:var(--navy);border:1.5px solid var(--border);}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;border-radius:10px;}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #fecaca;}

/* ── TABLE (mobile scroll) ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px;border:1px solid var(--border);background:var(--white);}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px;}
th{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:0.8px;color:var(--light);text-transform:uppercase;white-space:nowrap;}
td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--mid);vertical-align:middle;}
tr:last-child td{border-bottom:none;}

/* ── SEARCH BAR ── */
.search-bar{display:flex;align-items:center;background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;gap:10px;margin-bottom:14px;}
.search-bar input{flex:1;border:none;outline:none;font-family:"Barlow",sans-serif;font-size:14px;color:var(--text);background:transparent;}
.search-icon{font-size:16px;color:var(--light);flex-shrink:0;}

/* ── CUSTOMER PROFILE ── */
.profile-header{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:16px;padding:20px;margin-bottom:14px;text-align:center;}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;margin:0 auto 10px;}
.profile-name{font-family:"Barlow Condensed",sans-serif;font-size:24px;font-weight:800;color:#fff;}
.profile-sub{font-size:13px;color:rgba(255,255,255,0.6);margin-top:3px;}
.profile-actions{display:flex;gap:8px;margin-top:14px;justify-content:center;}
.profile-action-btn{background:rgba(255,255,255,0.15);color:#fff;border:none;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;}

/* ── NOTE CARD ── */
.note-card{background:var(--bg);border-radius:12px;padding:12px 14px;border-left:3px solid var(--orange);margin-bottom:10px;}
.note-date{font-size:11px;color:var(--light);font-weight:600;}
.note-text{font-size:13px;color:var(--mid);margin-top:5px;line-height:1.5;}
.note-author{font-size:11px;color:var(--orange);font-weight:600;margin-top:5px;}

/* ── PROFIT ROW ── */
.profit-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.profit-row:last-child{border-bottom:none;}

/* ── SETTINGS ── */
.settings-section{background:var(--white);border-radius:14px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden;}
.settings-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:12px;}
.settings-row:last-child{border-bottom:none;}
.settings-row:active{background:var(--bg);}
.settings-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.settings-label{flex:1;font-size:14px;font-weight:600;color:var(--navy);}
.settings-value{font-size:12px;color:var(--light);max-width:140px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.settings-arrow{color:var(--light);font-size:12px;}

/* ── INVOICE PREVIEW ── */
.inv-wrap{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
.inv-top{background:var(--navy);padding:20px;display:flex;align-items:center;gap:12px;}
.inv-logo{width:48px;height:48px;object-fit:contain;border-radius:8px;background:#fff;padding:2px;}
.inv-company{color:#fff;}
.inv-company-name{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;}
.inv-company-tag{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:1.5px;}
.inv-body{padding:16px;}
.inv-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.inv-row:last-child{border-bottom:none;}
.inv-row-label{color:var(--mid);}
.inv-row-val{font-weight:600;color:var(--navy);}
.inv-total{background:var(--navy);margin:16px -16px -16px;padding:16px;display:flex;justify-content:space-between;align-items:center;}
.inv-total-label{color:rgba(255,255,255,0.7);font-size:13px;font-weight:700;letter-spacing:1px;}
.inv-total-val{font-family:"Barlow Condensed",sans-serif;font-size:28px;font-weight:800;color:var(--orange);}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:14px 0;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--light);}

/* ── OVERLAY for more drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:18;display:none;}
.drawer-overlay.open{display:block;}

/* ── PULL TO REFRESH indicator ── */
.page-title{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;color:var(--navy);margin-bottom:14px;}
</style>
</head>

// ─── HELPERS ──────────────────────────────────────────────────
const fmt = n => '$'+Number(n||0).toLocaleString('en-SG',{minimumFractionDigits:0});
const jobCost = j => Object.values(j.costs).reduce((a,v)=>a+v,0);
const jobProfit = j => j.revenue - jobCost(j);
const jobMargin = j => j.revenue>0?((jobProfit(j)/j.revenue)*100).toFixed(0):0;

function statusColor(s){
  return {Scheduled:'amber','On The Way':'blue',Started:'blue',Loading:'blue','In Transit':'navy',Unloading:'navy',Completed:'green',Cancelled:'red',Paid:'green',Unpaid:'amber',Partial:'blue',Overdue:'red',Sent:'orange',Negotiating:'amber',Converted:'green',Draft:'navy',Available:'green',Unavailable:'red','In Service':'amber',Maintenance:'red'}[s]||'navy';
}
function badge(text,color){return `<span class="list-badge bg-${color||statusColor(text)}">${text}</span>`;}

let STATE = {page:'dashboard',param:null};

// ─── NAVIGATION ───────────────────────────────────────────────
function nav(page, param=null){
  STATE.page=page; STATE.param=param;
  const titles={dashboard:'Dashboard',customers:'Customers',jobs:'Jobs',invoices:'Invoices',quotations:'Quotations',expenses:'Expenses',payments:'Payments',reports:'Reports & P&L',schedule:'Schedule',crew:'Crew',trucks:'Trucks',settings:'Settings',customerProfile:'Customer',notifications:'Notifications'};
  document.getElementById('hdr-title').textContent = titles[page]||page;
  document.querySelectorAll('.nav-item').forEach(el=>{
    const id=el.id.replace('nav-','');
    el.classList.toggle('active', id===page||(page==='customerProfile'&&id==='customers'));
  });
  render();
  document.getElementById('main-content').scrollTo(0,0);
  // hide FAB on some pages
  document.getElementById('fab').style.display = ['settings','reports'].includes(page)?'none':'flex';
}

function toggleMore(){
  document.getElementById('more-drawer').classList.toggle('open');
  document.getElementById('drawer-overlay').classList.toggle('open');
}
function closeMore(){
  document.getElementById('more-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ─── RENDER ───────────────────────────────────────────────────
function render(){
  const el = document.getElementById('main-content');
  const pages={dashboard,customers,customerProfile,jobs,invoices,quotations,expenses,payments,reports,schedule,crew,trucks,settings,notifications};
  el.innerHTML='';
  const d=document.createElement('div');
  d.className='page';
  d.innerHTML=(pages[STATE.page]||dashboard)();
  el.appendChild(d);
}

function openModal(html){
  document.getElementById('modal-box').innerHTML='<div class="modal-handle"></div>'+html;
  document.getElementById('modal').style.display='flex';
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal'))
    document.getElementById('modal').style.display='none';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

window.showLogoUpload=function(){
  openModal(`

      <div style="font-size:13px;color:var(--mid)">Current logo</div>
    </div>
    <div style="border:2px dashed var(--border);border-radius:14px;padding:24px;text-align:center;margin-bottom:16px" onclick="document.getElementById('logo-file').click()">

      <div style="font-size:12px;color:var(--light)">PNG or JPG — appears everywhere</div>
    </div>
    <input type="file" id="logo-file" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
    <div class="modal-footer" style="padding:14px 0 0">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
};

window.handleLogoUpload=function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    COMPANY.logo=ev.target.result;
    document.getElementById('hdr-logo').src=ev.target.result;
    document.getElementById('logo-preview').src=ev.target.result;
    setTimeout(()=>{closeModal();},800);
  };
  reader.readAsDataURL(file);
};
